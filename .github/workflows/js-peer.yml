name: js-peer build

permissions:
  contents: read
  pull-requests: write
  statuses: write

on:
  push:
    branches: [main] # Deploy every commit so we can CIDs for every commit on main
  pull_request:
    branches: [main]
    paths:
      - 'js-peer/**' # only run for PRs changing js-peer
      - '.github/workflows/js-peer.yml' # also validate workflow-only changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
    defaults:
      run:
        working-directory: js-peer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Debug Aleph inputs
        run: |
          if [[ -n "$ALEPH_PRIVATE_KEY" ]]; then
            echo "ALEPH_PRIVATE_KEY is set"
          else
            echo "ALEPH_PRIVATE_KEY is missing"
          fi
          if [[ -n "${{ vars.ALEPH_DOMAIN }}" ]]; then
            echo "ALEPH_DOMAIN=${{ vars.ALEPH_DOMAIN }}"
          else
            echo "ALEPH_DOMAIN is missing"
          fi
          echo "github.event_name=${{ github.event_name }}"
          echo "github.ref=${{ github.ref }}"
      - name: Deploy preview on Aleph
        id: deploy
        if: github.event_name == 'pull_request'
        uses: aleph-im/web3-hosting-action@v1.1.4
        with:
          path: js-peer/out
      - name: Deploy production on Aleph
        id: deploy_prod
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.ALEPH_PRIVATE_KEY != ''
        uses: aleph-im/web3-hosting-action@v1.1.4
        with:
          path: js-peer/out
          private-key: ${{ env.ALEPH_PRIVATE_KEY }}
          retention_days: ${{ vars.ALEPH_RETENTION_DAYS }}
      - name: Link production domain on Aleph as IPFS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.ALEPH_PRIVATE_KEY != '' && vars.ALEPH_DOMAIN != ''
        run: |
          if [[ -z "${ITEM_HASH:-}" ]]; then
            echo "ITEM_HASH is missing after Aleph deployment"
            exit 1
          fi
          mkdir -p /home/runner/.aleph-im/private-keys
          echo "$ALEPH_PRIVATE_KEY" | xxd -r -p > /home/runner/.aleph-im/private-keys/ethereum.key
          aleph domain detach "${{ vars.ALEPH_DOMAIN }}" --no-ask || true
          aleph domain attach "${{ vars.ALEPH_DOMAIN }}" --item-hash "$ITEM_HASH" --catch-all-path /index.html --no-ask
